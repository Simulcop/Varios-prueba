name: Vinyl Deal Radar - sondeo

# Lee X periodicamente y te avisa por WhatsApp si hay deals que casan con tus
# alertas. Los runners de GitHub tienen salida a internet (e IPs distintas, que
# suelen esquivar el limite de X), asi que aqui la lectura es real.

on:
  schedule:
    - cron: '*/30 * * * *' # cada 30 min (ajusta a tu gusto)
  workflow_dispatch: {} # permite lanzarlo a mano desde la pestana Actions

# Necesitamos permiso de escritura para commitear data/deals.json (el feed real
# que luego lee la web en Render).
permissions:
  contents: write

# Evita solapes si una ejecucion tarda mas de lo previsto.
concurrency:
  group: vinyl-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Recupera lo ya notificado y la cache de enriquecimiento entre ejecuciones.
      - name: Restaurar estado
        uses: actions/cache@v4
        with:
          path: |
            data/seen.json
            data/enrich-cache.json
            data/bio-cache.json
          key: vinyl-state-v4-${{ github.run_id }}
          restore-keys: |
            vinyl-state-v4-

      - name: Leer X, enriquecer y notificar
        env:
          LIVE_ONLY: '1' # nunca alertar con datos de ejemplo
          DIGEST: '1' # un solo mensaje-resumen en WhatsApp (fiable con CallMeBot)
          RSS_FEEDS: ${{ secrets.RSS_FEEDS }} # urls de feeds RSS (X via RSS.app) separadas por coma
          SITE_FEEDS: ${{ secrets.SITE_FEEDS }} # webs de deals (vacio = ninguna; off por defecto)
          REDDIT_FEEDS: ${{ secrets.REDDIT_FEEDS }} # subreddits .rss (vacio = r/VinylDeals por defecto)
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }} # bio de respaldo (clave gratis)
        run: node scripts/run-fetch.mjs

      # Publica el feed real: si data/deals.json cambio, lo commitea. La web de
      # Render se auto-despliega con este commit y muestra los deals frescos.
      - name: Publicar deals.json
        run: |
          git config user.name "vinyl-deal-radar[bot]"
          git config user.email "actions@github.com"
          git add data/deals.json
          # --cached detecta tanto ficheros nuevos (sin trackear) como modificados.
          if ! git diff --cached --quiet; then
            git commit -m "Actualizar feed de deals [skip ci]"
            git push
          else
            echo "Sin cambios en data/deals.json"
          fi
